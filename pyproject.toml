[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "SIM108", # use ternary operator (readability preference)
    "UP007",  # use X | Y for union types (compatibility)
    "I001",   # import block sorting (source SHA-256 locked)
    "UP017",  # datetime.UTC alias (source SHA-256 locked)
    "W291",   # trailing whitespace (source SHA-256 locked)
]

[tool.ruff.lint.isort]
known-first-party = ["smart_grid_detector", "edge_quantizer"]
