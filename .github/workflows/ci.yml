name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install CPU-only PyTorch and dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check smart_grid_detector.py edge_quantizer.py tests/

      - name: Syntax check
        run: python -m py_compile smart_grid_detector.py && python -m py_compile edge_quantizer.py && python -m py_compile tests/test_smart_grid_detector.py

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check JS files
        run: |
          node --check simulation_site/app.js
          node --check simulation_site/logic.mjs
          node --check simulation_site/topology-loader.js
          node --check simulation_site/topology3d.js
          node --check simulation_site/dsp-engine.js
          node --check simulation_site/autoencoder-sim.js
          node --check simulation_site/hardware-export.js

      - name: Run Node tests
        run: node --test tests/test_frontend_logic.mjs

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright and browsers
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start local dashboard server
        run: |
          cd simulation_site
          python3 -m http.server 8000 &
          sleep 2

      - name: Run Playwright E2E tests
        run: npx playwright test tests/e2e/dashboard_audit.spec.js --reporter=list
        env:
          DASHBOARD_URL: http://localhost:8000/

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: [python, node, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements.txt pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
